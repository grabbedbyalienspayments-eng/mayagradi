<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>WebsiteON — Grădinițe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0a0a0f;
  --surf:    #13131a;
  --surf2:   #1c1c28;
  --border:  #2a2a3d;
  --accent:  #6c63ff;
  --accent2: #ff6584;
  --green:   #22c55e;
  --red:     #ef4444;
  --yellow:  #f59e0b;
  --blue:    #3b82f6;
  --text:    #e8e8f0;
  --muted:   #6060a0;
  --sb: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Sora', sans-serif;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.logo { font-size: 12px; font-weight: 700; letter-spacing: .1em; color: var(--accent); text-transform: uppercase; white-space: nowrap; }
.prog-wrap { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; }
.prog-bar { flex: 1; height: 5px; background: var(--surf2); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .4s ease; }
.prog-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); white-space: nowrap; }
.export-btn {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600;
  padding: 6px 10px; border-radius: 8px; cursor: pointer; white-space: nowrap;
  -webkit-appearance: none; transition: all .2s;
}
.export-btn:active { border-color: var(--accent); color: var(--accent); }

/* ── MAIN ── */
.main { max-width: 680px; margin: 0 auto; padding: 14px 14px calc(14px + var(--sb)); display: flex; flex-direction: column; gap: 12px; }

/* ── FIRM CARD ── */
.firm-card {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px; position: relative; overflow: hidden;
}
.firm-card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
.firm-badge { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.firm-index { font-size:10px; font-family:'DM Mono',monospace; color:var(--muted); }
.firm-type-tag { font-size:10px; font-weight:600; letter-spacing:.05em; color:var(--accent); background:rgba(108,99,255,.12); border:1px solid rgba(108,99,255,.25); padding:2px 8px; border-radius:99px; }
.firm-name { font-size:19px; font-weight:700; line-height:1.25; margin-bottom:12px; }
.firm-meta { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; }
.tag { background:var(--surf2); border:1px solid var(--border); border-radius:8px; padding:5px 10px; font-size:12px; color:var(--muted); display:inline-flex; align-items:center; gap:5px; text-decoration:none; transition:opacity .15s; }
.tag.rating  { color:var(--yellow); border-color:rgba(245,158,11,.2); background:rgba(245,158,11,.06); }
.tag.phone   { color:var(--green);  border-color:rgba(34,197,94,.2);   background:rgba(34,197,94,.06); }
.tag.website { color:var(--blue);   border-color:rgba(59,130,246,.2);  background:rgba(59,130,246,.06); }
.tag.maps    { color:var(--text);   border-color:rgba(255,255,255,.1); background:rgba(255,255,255,.03); }
.tag:active { opacity:.7; }

/* ── OBS BOX ── */
.obs-box { background:var(--surf2); border:1px solid rgba(108,99,255,.2); border-left:3px solid var(--accent); border-radius:10px; padding:12px 14px; }
.obs-label { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
.obs-text { font-size:14px; line-height:1.7; color:#cccce0; white-space:pre-line; }

/* ── SCRIPT ── */
.script-container { background:var(--surf); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
.script-header { padding:12px 16px; background:var(--surf2); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.script-title { font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
.scroll-hint { font-size:10px; color:var(--muted); opacity:.5; }
.script-body { padding:16px; }

.section { margin-bottom:20px; }
.section:last-child { margin-bottom:0; }
.sec-label { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.sec-label::after { content:''; flex:1; height:1px; background:var(--border); }
.sec-label.yellow { color:var(--yellow); }

.sline { font-size:15px; line-height:1.8; color:var(--text); margin-bottom:8px; }
.sline strong { color:#fff; font-weight:600; }

.hbox { background:linear-gradient(90deg,rgba(108,99,255,.1),transparent); border-left:3px solid var(--accent); padding:10px 14px; border-radius:0 10px 10px 0; margin-bottom:10px; font-size:15px; line-height:1.8; color:var(--text); }
.hbox strong { color:#fff; }

.rpill { display:inline-block; background:rgba(245,158,11,.15); border:1px solid rgba(245,158,11,.35); color:var(--yellow); font-weight:700; padding:1px 8px; border-radius:99px; font-size:14px; }

.li { font-size:14px; line-height:1.7; color:#cccce0; padding-left:18px; position:relative; margin-bottom:5px; }
.li::before { content:'→'; position:absolute; left:0; color:var(--accent); font-weight:700; }

.obs-in-label { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--accent2); margin-bottom:6px; }
.obs-in-wrap { margin:10px 0 14px; }

.prices-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0; }
.price-box { background:var(--surf2); border:1px solid var(--border); border-radius:10px; padding:12px; }
.price-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
.price-val { font-size:16px; font-weight:700; color:#fff; font-family:'DM Mono',monospace; }

.modif-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:8px 0; }
.modif-box { background:var(--surf2); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
.modif-label { font-size:10px; color:var(--muted); margin-bottom:4px; }
.modif-val { font-size:14px; font-weight:700; color:#fff; font-family:'DM Mono',monospace; }
.modif-sub { font-size:9px; color:var(--muted); margin-top:2px; }

.objection { background:var(--surf2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; }
.objection.tech { border-color:rgba(245,158,11,.25); border-left:3px solid var(--yellow); background:rgba(245,158,11,.04); }
.obj-q { font-size:11px; font-weight:700; color:var(--accent2); margin-bottom:6px; text-transform:uppercase; letter-spacing:.06em; }
.obj-q.yellow { color:var(--yellow); }
.obj-a { font-size:14px; line-height:1.7; color:#cccce0; }
.tech-warn { margin-top:8px; padding:8px 10px; background:var(--surf); border-radius:8px; font-size:12px; color:var(--muted); }

/* ── STATUS ── */
.status-section { background:var(--surf); border:1px solid var(--border); border-radius:16px; padding:16px; }
.sec-header { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
.status-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:12px; }
.status-btn {
  padding:14px 8px; border-radius:12px; border:2px solid var(--border);
  font-family:'Sora',sans-serif; font-size:13px; font-weight:600; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  background:var(--surf2); color:var(--muted);
  transition:all .15s; min-height:52px;
  touch-action:manipulation; user-select:none; -webkit-user-select:none; -webkit-appearance:none;
}
.status-btn:active { transform:scale(.96); }
.s-interesat.on    { background:rgba(34,197,94,.1);   border-color:var(--green);  color:var(--green); }
.s-nu-raspuns.on   { background:rgba(245,158,11,.1);  border-color:var(--yellow); color:var(--yellow); }
.s-nu-interesat.on { background:rgba(239,68,68,.1);   border-color:var(--red);    color:var(--red); }
.s-resunat.on      { background:rgba(59,130,246,.1);  border-color:var(--blue);   color:var(--blue); }

.notes-area {
  width:100%; background:var(--surf2); border:1.5px solid var(--border); border-radius:10px;
  padding:12px; color:var(--text); font-family:'Sora',sans-serif; font-size:14px;
  resize:none; min-height:68px; outline:none; transition:border-color .2s; -webkit-appearance:none;
}
.notes-area:focus { border-color:var(--accent); }
.notes-area::placeholder { color:var(--muted); }

/* ── NAV ── */
.nav-section { display:flex; gap:10px; padding-bottom:var(--sb); }
.nav-btn {
  flex:1; padding:16px; border-radius:14px; border:none;
  font-family:'Sora',sans-serif; font-size:15px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  min-height:56px; touch-action:manipulation; user-select:none; -webkit-appearance:none;
  transition:all .2s;
}
.nav-btn:active { transform:scale(.97); }
.nav-prev { background:var(--surf2); color:var(--muted); border:1.5px solid var(--border); max-width:120px; }
.nav-next { background:linear-gradient(135deg,var(--accent),#9c8cff); color:#fff; box-shadow:0 4px 20px rgba(108,99,255,.35); }
.nav-next:hover { box-shadow:0 6px 28px rgba(108,99,255,.5); }

/* ── DONE ── */
.done-screen { display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; min-height:80dvh; text-align:center; padding:40px 20px; }
.done-screen.show { display:flex; }
.done-emoji { font-size:60px; }
.done-title { font-size:24px; font-weight:700; }
.done-sub { font-size:14px; color:var(--muted); max-width:280px; line-height:1.6; }
.done-stats { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.stat-chip { padding:8px 14px; border-radius:99px; font-size:13px; font-weight:600; border:1.5px solid; }
.done-export { background:linear-gradient(135deg,var(--accent),#9c8cff); color:#fff; border:none; padding:16px 32px; border-radius:14px; font-family:'Sora',sans-serif; font-size:16px; font-weight:700; cursor:pointer; min-height:56px; box-shadow:0 4px 20px rgba(108,99,255,.35); -webkit-appearance:none; margin-top:8px; }
.done-back { background:var(--surf2); color:var(--muted); border:1.5px solid var(--border); padding:12px 24px; border-radius:12px; font-family:'Sora',sans-serif; font-size:14px; font-weight:600; cursor:pointer; -webkit-appearance:none; }

@media (max-width:420px) {
  .firm-name { font-size:17px; }
  .sline,.hbox { font-size:14px; }
  .obj-a,.li { font-size:13px; }
  .nav-prev { max-width:100px; font-size:13px; }
  .status-btn { font-size:12px; padding:12px 6px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">WebsiteON 🏫</div>
  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
    <div class="prog-label" id="pLabel">1 / 15</div>
  </div>
  <button class="export-btn" onclick="exportCSV()">⬇ CSV</button>
</div>

<div class="main" id="mainContent">

  <div class="firm-card">
    <div class="firm-badge">
      <div class="firm-index" id="firmIndex">Grădiniță #1</div>
      <div class="firm-type-tag">Grădiniță</div>
    </div>
    <div class="firm-name" id="firmName"></div>
    <div class="firm-meta" id="firmMeta"></div>
    <div class="obs-box">
      <div class="obs-label">👁 Observații website</div>
      <div class="obs-text" id="firmObs"></div>
    </div>
  </div>

  <div class="script-container">
    <div class="script-header">
      <div class="script-title">📞 Script apel</div>
      <div class="scroll-hint">↕ derulează</div>
    </div>
    <div class="script-body" id="scriptBody"></div>
  </div>

  <div class="status-section">
    <div class="sec-header">Rezultat apel</div>
    <div class="status-grid">
      <button class="status-btn s-interesat"    id="btn-interesat"    onclick="setStatus('interesat')">✅ Interesat</button>
      <button class="status-btn s-nu-raspuns"   id="btn-nu-raspuns"   onclick="setStatus('nu-raspuns')">📵 Nu a răspuns</button>
      <button class="status-btn s-nu-interesat" id="btn-nu-interesat" onclick="setStatus('nu-interesat')">❌ Nu e interesat</button>
      <button class="status-btn s-resunat"      id="btn-resunat"      onclick="setStatus('resunat')">🔄 Resunat mai târziu</button>
    </div>
    <textarea class="notes-area" id="notesArea" placeholder="Notițe rapide (WA, email, feedback)…" rows="3" oninput="saveNote()"></textarea>
  </div>

  <div class="nav-section">
    <button class="nav-btn nav-prev" id="prevBtn" onclick="navigate(-1)">← Înapoi</button>
    <button class="nav-btn nav-next" id="nextBtn" onclick="navigate(1)">Următor →</button>
  </div>

</div>

<div class="done-screen" id="doneScreen">
  <div class="done-emoji">🎉</div>
  <div class="done-title">Lista finalizată!</div>
  <div class="done-stats" id="doneStats"></div>
  <div class="done-sub">Descarcă CSV-ul pentru a vedea toate rezultatele.</div>
  <button class="done-export" onclick="exportCSV()">⬇ Descarcă CSV rezultate</button>
  <button class="done-back" onclick="goBack()">← Înapoi la listă</button>
</div>

var current = 0;
var results = FIRMS.map(function(){ return {status:'', notes:''}; });

try {
  var sr = sessionStorage.getItem('wson_g_r');
  var si = sessionStorage.getItem('wson_g_i');
  if (sr) results = JSON.parse(sr);
  if (si) current = Math.min(parseInt(si), FIRMS.length - 1);
} catch(e){}

function save() {
  try {
    sessionStorage.setItem('wson_g_r', JSON.stringify(results));
    sessionStorage.setItem('wson_g_i', String(current));
  } catch(e){}
}

function setStatus(s) {
  results[current].status = results[current].status === s ? '' : s;
  save();
  renderBtns();
}

function saveNote() {
  results[current].notes = document.getElementById('notesArea').value;
  save();
}

function navigate(dir) {
  if (dir > 0 && current === FIRMS.length - 1) { showDone(); return; }
  current = Math.max(0, Math.min(FIRMS.length - 1, current + dir));
  save();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function goBack() {
  document.getElementById('doneScreen').classList.remove('show');
  document.getElementById('mainContent').style.display = '';
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function showDone() {
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('doneScreen').classList.add('show');
  var c = {
    interesat: results.filter(function(r){return r.status==='interesat';}).length,
    nr: results.filter(function(r){return r.status==='nu-raspuns';}).length,
    ni: results.filter(function(r){return r.status==='nu-interesat';}).length,
    re: results.filter(function(r){return r.status==='resunat';}).length,
    ns: results.filter(function(r){return !r.status;}).length
  };
  document.getElementById('doneStats').innerHTML =
    '<div class="stat-chip" style="color:var(--green);border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.08)">\u2705 '+c.interesat+' interesa\u021bi</div>'+
    '<div class="stat-chip" style="color:var(--yellow);border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.08)">\uD83D\uDCF5 '+c.nr+' nu au r\u0103spuns</div>'+
    '<div class="stat-chip" style="color:var(--red);border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.08)">\u274C '+c.ni+' nu sunt interesa\u021bi</div>'+
    '<div class="stat-chip" style="color:var(--blue);border-color:rgba(59,130,246,.25);background:rgba(59,130,246,.08)">\uD83D\uDD04 '+c.re+' de resunat</div>'+
    (c.ns > 0 ? '<div class="stat-chip" style="color:var(--muted);border-color:var(--border)">\u23F3 '+c.ns+' nesunate</div>' : '');
}

function renderBtns() {
  var s = results[current].status;
  ['interesat','nu-raspuns','nu-interesat','resunat'].forEach(function(id){
    var el = document.getElementById('btn-'+id);
    if (s === id) el.classList.add('on');
    else el.classList.remove('on');
  });
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  var firm = FIRMS[current];
  var total = FIRMS.length;

  document.getElementById('pFill').style.width = ((current + 1) / total * 100) + '%';
  document.getElementById('pLabel').textContent = (current + 1) + ' / ' + total;
  document.getElementById('firmIndex').textContent = 'Gr\u0103dini\u021b\u0103 #' + (current + 1);
  document.getElementById('firmName').textContent = firm.name;

  var metaHtml = '<div class="tag rating">\u2B50 ' + firm.rating + ' \u00B7 ' + firm.reviews + ' recenzii</div>';
  if (firm.phone) metaHtml += '<a href="tel:' + esc(firm.phone) + '" class="tag phone">\uD83D\uDCDE ' + esc(firm.phone) + '</a>';
  if (firm.website) metaHtml += '<a href="' + esc(firm.website) + '" target="_blank" rel="noopener" class="tag website">\uD83C\uDF10 Website</a>';
  if (firm.mapsUrl) metaHtml += '<a href="' + esc(firm.mapsUrl) + '" target="_blank" rel="noopener" class="tag maps">\uD83D\uDCCD Maps</a>';
  document.getElementById('firmMeta').innerHTML = metaHtml;

  document.getElementById('firmObs').textContent = firm.obs;
  document.getElementById('scriptBody').innerHTML = buildScript(firm);

  renderBtns();
  document.getElementById('notesArea').value = results[current].notes || '';

  var prevBtn = document.getElementById('prevBtn');
  prevBtn.style.opacity = current === 0 ? '0.35' : '1';
  prevBtn.disabled = current === 0;

  document.getElementById('nextBtn').textContent = current === total - 1 ? '\u2713 Finalizat' : 'Urm\u0103tor \u2192';
}

function exportCSV() {
  var headers = ['Nr','Firma','Telefon','Rating','Recenzii','Adresa','Website','Status','Notite'];
  var rows = FIRMS.map(function(f, i) {
    return [
      i + 1,
      '"' + (f.name||'').replace(/"/g,'""') + '"',
      f.phone || '',
      f.rating || '',
      f.reviews || '',
      '"' + (f.address||'').replace(/"/g,'""') + '"',
      f.website || '',
      results[i].status || 'nesunat',
      '"' + (results[i].notes||'').replace(/"/g,'""').replace(/\n/g,' ') + '"'
    ].join(',');
  });
  var csv = '\uFEFF' + [headers.join(',')].concat(rows).join('\r\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'websiteon-gradinite-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);}, 1000);
}

render();
</script>
